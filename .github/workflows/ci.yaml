name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
      branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle 권한 부여
        run: chmod +x gradlew

      - name: 빌드 + 테스트
        run: ./gradlew clean build
